<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{{ titulo }}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        form { background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #ccc; max-width: 400px; }
        input, textarea { width: 100%; margin-bottom: 10px; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>{{ titulo }}</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Salvar Registro</button>
    </form>
    <br>
    <a href="{% url 'index' %}">Voltar ao Menu</a>
</body>
</html>
