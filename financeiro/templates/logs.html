<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Logs de Auditoria</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>
    <h1>Logs de Acesso e Modificações</h1>
    <table>
        <thead>
            <tr>
                <th>Data/Hora</th>
                <th>Usuário</th>
                <th>Ação Realizada</th>
                <th>Montante</th>
            </tr>
        </thead>
        <tbody>
            {% for log in logs %}
            <tr>
                <td>{{ log.data_hora|date:"d/m/Y H:i" }}</td>
                <td>{{ log.usuario|default:"Anônimo" }}</td>
                <td>{{ log.acao }}</td>
                <td>{{ log.montante }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4">Nenhum log registrado ainda.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <br>
    <a href="{% url 'index' %}">Voltar ao Menu</a>
</body>
</html>
